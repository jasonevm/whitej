name: Aggregator Black
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install aiohttp
      - name: Install xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip xray
          chmod +x xray && sudo mv xray /usr/local/bin/xray
      - name: Generate configs_black.txt
        run: python generate_black.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs_black.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update sub from $(date +'%Y-%m-%d %H:%M:%S')"
          git push
