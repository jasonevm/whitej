name: Mirror CatWhiteVPN Configs

on:
  schedule:
    - cron: '0 * * * *' # Каждый час в 00 минут
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Generate configs.txt
        run: python generate_configs.py > configs.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление подписки от $(date +'%Y-%m-%d %H:%M:%S')"
          git push
